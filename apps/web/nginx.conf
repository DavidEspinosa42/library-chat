# SPA + reverse proxy to the api service (docs/01, docs/04).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SSE endpoint: buffering OFF so token events stream to the client as they
    # arrive (docs/04). Long read timeout covers slow agent turns + keep-alives.
    location /api/v1/chat {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    location = /healthz {
        proxy_pass http://api:3000/healthz;
    }

    # SPA fallback: client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
