name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: lint · typecheck · tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: librarychat
          POSTGRES_PASSWORD: librarychat
          POSTGRES_DB: librarychat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U librarychat"
          --health-interval 5s --health-timeout 3s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The API test suite runs against a dedicated database (TEST_MODE fakes all
      # AI, so the DB is the only external dependency — no network, no keys).
      - name: Create test database
        run: PGPASSWORD=librarychat psql -h localhost -U librarychat -d librarychat -c 'CREATE DATABASE librarychat_test;'
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  docker:
    name: docker builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false

  terraform:
    name: terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Terraform lands in Phase 7 — this job no-ops until infra/terraform exists.
      - name: Detect terraform
        id: tf
        run: |
          if [ -d infra/terraform ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi
      - uses: hashicorp/setup-terraform@v3
        if: steps.tf.outputs.exists == 'true'
      - name: fmt + validate
        if: steps.tf.outputs.exists == 'true'
        run: |
          terraform -chdir=infra/terraform fmt -check
          terraform -chdir=infra/terraform init -backend=false
          terraform -chdir=infra/terraform validate
